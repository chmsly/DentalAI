spring.application.name=DentalAI

# JPA Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/dentalai
spring.datasource.username=your_mysql_username
spring.datasource.password=your_mysql_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# DynamoDB Configuration
amazon.dynamodb.endpoint=https://dynamodb.${AWS_REGION}.amazonaws.com
amazon.aws.accesskey=${AWS_ACCESS_KEY_ID}
amazon.aws.secretkey=${AWS_SECRET_ACCESS_KEY}
